language: python

python:
  - "3.10"
  - "3.11"
  - "3.12"

install:
  - pip install -r djangotutorial/requirements.txt

before_script:
  - cd djangotutorial
  - python manage.py migrate

script:
  - black --check .
  - flake8 .
  - coverage run --source=mysite,polls manage.py test

after_success:
  - if [ "$TRAVIS_PYTHON_VERSION" = "3.12" ]; then coveralls; fi

deploy:
  provider: elasticbeanstalk
  access_key_id: "$AWS_ACCESS_KEY_ID"
  secret_access_key: "$AWS_SECRET_ACCESS_KEY"
  region: "us-east-1"
  app: "djangotutorial"
  env: "djangotutorial-env"
  bucket: "elasticbeanstalk-us-east-1-314323855341"
  edge: true
  on:
    branch: main
    python: "3.12"