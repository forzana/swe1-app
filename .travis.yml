python:
  - "3.8"
  - "3.9"
  - "3.10"
  - "3.11"
  - "3.12"

install:
  - pip install -r djangotutorial/requirements.txt

before_script:
  - cd djangotutorial && python manage.py migrate
  - cd djangotutorial && python manage.py collectstatic --noinput

script:
  - cd djangotutorial && black --check .
  - cd djangotutorial && flake8 .
  - cd djangotutorial && coverage run --source=mysite,polls manage.py test

after_script:
  - coveralls
